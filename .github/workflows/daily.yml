name: Daily Test

on:
  schedule:
    - cron: '30 7 * * 1-5'  # 台灣時間週一至週五 15:30
  workflow_dispatch:          # 允許手動觸發（測試用）

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write today's date
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S') 執行成功" >> log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add log.txt
          git diff --staged --quiet || git commit -m "daily update $(date '+%Y-%m-%d')"
          git push

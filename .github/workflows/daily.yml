name: Daily Stock Data

on:
  schedule:
    - cron: '30 7 * * 1-5'   # UTC 07:30 = 台灣時間 15:30，週一至週五
  workflow_dispatch:           # 允許手動觸發
    inputs:
      date:
        description: '指定日期 YYYY-MM-DD（留空則使用今天）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run scraper
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scraper/main.py --date "${{ github.event.inputs.date }}"
          else
            python scraper/main.py
          fi

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No new data (non-trading day or already up to date). Skipping commit."
          else
            TW_DATE=$(TZ='Asia/Taipei' date '+%Y-%m-%d')
            git commit -m "daily update ${TW_DATE}"
            git push
          fi
